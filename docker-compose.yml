version: "3.9"

services:
  # ===== Base de données PostgreSQL =====
  db:
    image: postgres:16-alpine
    container_name: china_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: china_ai_user
      POSTGRES_PASSWORD: china_ai_password
      POSTGRES_DB: china_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U china_ai_user -d china_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== Cache / Rate limiting (optionnel mais recommandé) =====
  redis:
    image: redis:7-alpine
    container_name: china_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ===== Backend FastAPI =====
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: china_ai_backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://china_ai_user:china_ai_password@db:5432/china_ai_db
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/backend/uploads

  # ===== Frontend React (servi par Nginx) =====
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: china_ai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
